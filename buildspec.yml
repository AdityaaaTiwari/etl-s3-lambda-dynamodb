version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Build started..."
      - python -m py_compile lambda_function.py
      - echo "Build completed successfully."

artifacts:
  files:
    - '**/*'